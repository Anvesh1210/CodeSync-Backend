spring.application.name=auth-service
spring.config.import=optional:file:../.env[.properties]
server.port=${AUTH_SERVICE_PORT:8081}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Mail Configuration (Dummy Mailtrap for local dev, or console)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#app.oauth2.google.client-id=${GOOGLE_CLIENT_ID}
#app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET}
#app.oauth2.github.client-id=${GITHUB_CLIENT_ID:}

spring.application.name=session-service
spring.config.import=optional:file:../.env[.properties]

server.port=${SESSION_SERVICE_PORT:8084}

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Redis config (Spring Boot 3 uses spring.data.redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# MySQL Database
spring.datasource.url=${SESSION_DB_URL}
spring.datasource.username=${SESSION_DB_USERNAME}
spring.datasource.password=${SESSION_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.application.name=comment-service
server.port=${COMMENT_SERVICE_PORT}

spring.datasource.url=${COMMENT_DB_URL}
spring.datasource.username=${COMMENT_DB_USERNAME}
spring.datasource.password=${COMMENT_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.serviceUrl.defaultZone=${EUREKA_URL}
eureka.instance.hostname=${EUREKA_HOSTNAME}


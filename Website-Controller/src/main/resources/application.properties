spring.application.name=website-controller
spring.config.import=optional:file:../.env[.properties]

server.port=${WEBSITE_CONTROLLER_PORT:8089}

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# JWT secret — must match auth-service so we can parse role claims locally
app.jwt.secret=${JWT_SECRET}
